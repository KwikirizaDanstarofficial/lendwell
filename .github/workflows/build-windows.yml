name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: Lendwell-Windows
            ext: exe
          - os: ubuntu-latest
            platform: linux
            artifact: Lendwell-Linux
            ext: AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject Config Server URL (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $url = "$env:CONFIG_SERVER_URL"
          if ($url) {
            (Get-Content electron/fetchConfig.ts) -replace "https://lendwell-config-server\.onrender\.com", $url | Set-Content electron/fetchConfig.ts
          }
        env:
          CONFIG_SERVER_URL: ${{ secrets.CONFIG_SERVER_URL }}

      - name: Inject Config Server URL (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ -n "$CONFIG_SERVER_URL" ]; then
            sed -i "s|https://lendwell-config-server\.onrender\.com|$CONFIG_SERVER_URL|g" electron/fetchConfig.ts
          fi
        env:
          CONFIG_SERVER_URL: ${{ secrets.CONFIG_SERVER_URL }}

      - name: Build Next.js
        run: npm run build
        env:
          NODE_OPTIONS: "--no-deprecation"
          CI: "true"
          npm_config_yes: "true"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POWERSYNC_URL: ${{ secrets.POWERSYNC_URL }}
          APP_URL: ${{ secrets.APP_URL }}
          SACCO_NAME: ${{ secrets.SACCO_NAME }}
          COMMS_SDK_USERNAME: ${{ secrets.COMMS_SDK_USERNAME }}
          COMMS_SDK_API_KEY: ${{ secrets.COMMS_SDK_API_KEY }}
          EGOSMS_SENDER_ID: ${{ secrets.EGOSMS_SENDER_ID }}
          FLW_PUBLIC_KEY: ${{ secrets.FLW_PUBLIC_KEY }}
          FLW_SECRET_KEY: ${{ secrets.FLW_SECRET_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Compile Electron
        run: npm run electron:compile

      - name: Generate ICO for installer
        if: matrix.os == 'windows-latest'
        run: node scripts/generate-ico.cjs

      - name: Package ${{ matrix.platform }}
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Audit bundle for leaked secrets (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          npx asar extract dist\win-unpacked\resources\app.asar dist\asar-extracted 2>$null
          $leaks = Select-String -Path "dist\asar-extracted\**\*.js" -Pattern "supabase\.co|egosms|flutterwave|powersync" -List
          if ($leaks) { Write-Host "WARNING: Secrets found in bundle"; $leaks | ForEach-Object { Write-Host $_ } }
          else { Write-Host "PASS: No secrets detected in bundle" }
          Remove-Item -Recurse -Force dist\asar-extracted -ErrorAction SilentlyContinue

      - name: Audit bundle for leaked secrets (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          asar e dist/linux-unpacked/resources/app.asar dist/asar-extracted 2>/dev/null || true
          leaks=$(grep -rl "supabase\.co\|egosms\|flutterwave\|powersync" dist/asar-extracted/ 2>/dev/null || true)
          if [ -n "$leaks" ]; then echo "WARNING: Secrets found: $leaks"; else echo "PASS: No secrets detected in bundle"; fi
          rm -rf dist/asar-extracted

      - name: Upload packages (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          retention-days: 30

      - name: Upload packages (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
