name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Fix napi-postinstall
        run: npm install --ignore-scripts

      - name: Build Next.js
        run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POWERSYNC_URL: ${{ secrets.POWERSYNC_URL }}
          APP_URL: ${{ secrets.APP_URL }}
          SACCO_NAME: ${{ secrets.SACCO_NAME }}
          COMMS_SDK_USERNAME: ${{ secrets.COMMS_SDK_USERNAME }}
          COMMS_SDK_API_KEY: ${{ secrets.COMMS_SDK_API_KEY }}
          EGOSMS_SENDER_ID: ${{ secrets.EGOSMS_SENDER_ID }}
          FLW_PUBLIC_KEY: ${{ secrets.FLW_PUBLIC_KEY }}
          FLW_SECRET_KEY: ${{ secrets.FLW_SECRET_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

      - name: Compile Electron
        run: npm run electron:compile

      - name: Generate ICO for installer
        run: node scripts/generate-ico.cjs

      - name: Package Windows
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: Lendwell-Windows
          path: |
            dist/*.exe
            dist/*.zip
          retention-days: 30
