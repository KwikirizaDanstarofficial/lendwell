<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3660"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="chevBot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="chevMid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="chevTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Hexagonal background -->
  <polygon points="40,3 72,21 72,59 40,77 8,59 8,21" fill="url(#iconBg)"/>

  <!-- Inner hex glow ring -->
  <polygon points="40,7 68,23 68,57 40,73 12,57 12,23"
           stroke="#ffffff" stroke-width="0.75" stroke-opacity="0.08" fill="none"/>

  <!-- Three ascending chevrons — bottom darkest → top brightest -->
  <path d="M19 63 L40 49 L61 63"
        stroke="url(#chevBot)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M21 51 L40 37 L59 51"
        stroke="url(#chevMid)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M23 39 L40 23 L57 39"
        stroke="url(#chevTop)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Gold coin at apex -->
  <circle cx="40" cy="19" r="6" fill="#f59e0b"/>
  <circle cx="40" cy="19" r="3.5" fill="#fbbf24"/>
  <circle cx="38.5" cy="17.5" r="1" fill="#fde68a" opacity="0.7"/>
</svg>
